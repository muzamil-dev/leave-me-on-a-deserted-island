id: mylife
name: MyLife
base_url: https://www.mylife.com
opt_out_url: https://www.mylife.com/who-is-searching-for-you/
method: form
captcha: none
confirm_email: true
recheck_days: 90
search_steps:
  - action: navigate
    url: "https://www.mylife.com/{{profile.first_name}}-{{profile.last_name}}"
  - action: wait_for
    selector: ".person-card"
find_indicator:
  type: text_contains
  value: "results for"
steps:
  - action: navigate
    url: "https://www.mylife.com/who-is-searching-for-you/"
  - action: fill
    selector: "input[name='email']"
    value: "{{profile.email}}"
  - action: click
    selector: "button[type='submit']"
success_indicator:
  type: text_contains
  value: "verification email"
