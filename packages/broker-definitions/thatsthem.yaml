id: thatsthem
name: That’s Them
base_url: https://thatsthem.com
opt_out_url: https://thatsthem.com/optout
method: form
captcha: none
confirm_email: true
recheck_days: 90
search_steps:
  - action: navigate
    url: "https://thatsthem.com/name/{{profile.first_name}}-{{profile.last_name}}/{{profile.state}}/{{profile.city}}"
  - action: wait_for
    selector: ".record"
find_indicator:
  type: text_contains
  value: "results for"
steps:
  - action: navigate
    url: "https://thatsthem.com/optout"
  - action: fill
    selector: "input[name='email']"
    value: "{{profile.email}}"
  - action: click
    selector: "button[type='submit']"
success_indicator:
  type: text_contains
  value: "verification email"
