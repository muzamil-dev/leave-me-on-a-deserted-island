id: intelius
name: Intelius
base_url: https://www.intelius.com
opt_out_url: https://www.intelius.com/opt-out/
method: form
captcha: none
confirm_email: true
recheck_days: 90
search_steps:
  - action: navigate
    url: "https://www.intelius.com/people-search/{{profile.first_name}}-{{profile.last_name}}/{{profile.state}}/{{profile.city}}"
  - action: wait_for
    selector: ".results-list"
find_indicator:
  type: text_contains
  value: "results for"
steps:
  - action: navigate
    url: "https://www.intelius.com/opt-out/"
  - action: fill
    selector: "input[name='email']"
    value: "{{profile.email}}"
  - action: click
    selector: "button[type='submit']"
success_indicator:
  type: text_contains
  value: "verification email"
