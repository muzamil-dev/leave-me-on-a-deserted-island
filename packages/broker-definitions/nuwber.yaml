id: nuwber
name: Nuwber
base_url: https://nuwber.com
opt_out_url: https://nuwber.com/removal
method: form
captcha: none
confirm_email: true
recheck_days: 90
search_steps:
  - action: navigate
    url: "https://nuwber.com/search?name={{profile.first_name}}%20{{profile.last_name}}&city={{profile.city}}&state={{profile.state}}"
result_list_selector: ".search-results .item, .person-card"
result_link_selector: "a[href*='/person/']"
result_filter: "{{profile.city}}"
steps:
  - action: navigate
    url: "https://nuwber.com/removal"
  - action: wait_for
    selector: "input[name='url']"
  - action: fill
    selector: "input[name='url']"
    value: "https://nuwber.com/search?name={{profile.first_name}}%20{{profile.last_name}}"
  - action: fill
    selector: "input[name='email']"
    value: "{{profile.email}}"
  - action: click
    selector: "button[type='submit']"
success_indicator:
  type: text_contains
  value: "verification email"
