id: spokeo
name: Spokeo
base_url: https://www.spokeo.com
opt_out_url: https://www.spokeo.com/optout
method: form
captcha: recaptcha_v2
confirm_email: true
recheck_days: 90
search_steps:
  - action: navigate
    url: "https://www.spokeo.com/{{profile.first_name}}-{{profile.last_name}}/{{profile.state}}/{{profile.city}}"
find_indicator:
  type: text_contains
  value: "results for"
steps:
  - action: navigate
    url: "https://www.spokeo.com/optout"
  - action: fill
    selector: "input[name='url']"
    value: "https://www.spokeo.com/{{profile.first_name}}-{{profile.last_name}}"
  - action: fill
    selector: "input[name='email']"
    value: "{{profile.email}}"
  - action: click
    selector: "button[type='submit']"
success_indicator:
  type: text_contains
  value: "check your email"
notes: "Spokeo requires a profile URL to opt out."
