id: clustrmaps
name: ClustrMaps
base_url: https://clustrmaps.com
opt_out_url: https://clustrmaps.com/bl/opt-out
method: form
captcha: none
confirm_email: true
recheck_days: 120
search_steps:
  - action: navigate
    url: "https://clustrmaps.com/persons/{{profile.first_name}}-{{profile.last_name}}/Orlando"
  - action: wait_for
    selector: "body"
result_list_selector: ".person-card, .search-result, .card, a[href*='/person/']"
result_link_selector: "a[href*='/person/']"
result_filter: "{{profile.first_name}}"
steps:
  - action: navigate
    url: "https://clustrmaps.com/bl/opt-out"
  - action: wait_for
    selector: "input[name='name']"
  - action: fill
    selector: "input[name='name']"
    value: "{{profile.first_name}} {{profile.last_name}}"
  - action: fill
    selector: "input[name='email']"
    value: "{{profile.email}}"
  - action: click
    selector: "button[type='submit']"
success_indicator:
  type: text_contains
  value: "sent you an email"
