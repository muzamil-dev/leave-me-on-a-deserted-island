id: checkpeople
name: CheckPeople
base_url: https://www.checkpeople.com
opt_out_url: https://www.checkpeople.com/optout
method: form
captcha: none
confirm_email: true
recheck_days: 90
search_steps:
  - action: navigate
    url: "https://www.checkpeople.com/optout"
  - action: fill
    selector: "input[name='firstName']"
    value: "{{profile.first_name}}"
  - action: fill
    selector: "input[name='lastName']"
    value: "{{profile.last_name}}"
  - action: fill
    selector: "input[name='city']"
    value: "{{profile.city}}"
  - action: select
    selector: "select[name='state']"
    value: "{{profile.state}}"
  - action: click
    selector: "button[type='submit']"
  - action: wait_for
    selector: ".results-list"
find_indicator:
  type: text_contains
  value: "results found"
steps:
  - action: click
    selector: ".btn-remove"
  - action: fill
    selector: "input[name='email']"
    value: "{{profile.email}}"
  - action: click
    selector: "button[type='submit']"
success_indicator:
  type: text_contains
  value: "verify your request"
