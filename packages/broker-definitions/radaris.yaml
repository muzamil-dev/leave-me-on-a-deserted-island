id: radaris
name: Radaris
base_url: https://radaris.com
opt_out_url: https://radaris.com/control/privacy
method: form
captcha: none
confirm_email: true
recheck_days: 90
search_steps:
  - action: navigate
    url: "https://radaris.com/p/{{profile.first_name}}/{{profile.last_name}}"
result_list_selector: ".person-card, .search-results li"
result_link_selector: "a[href*='/p/']"
result_filter: "{{profile.city}}"
steps:
  - action: navigate
    url: "https://radaris.com/control/privacy"
  - action: wait_for
    selector: "input[name='email']"
  - action: fill
    selector: "input[name='email']"
    value: "{{profile.email}}"
  - action: click
    selector: "button[type='submit']"
success_indicator:
  type: text_contains
  value: "verification email"
